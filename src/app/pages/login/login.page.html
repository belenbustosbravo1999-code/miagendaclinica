<ion-header>
  <ion-toolbar>
    <ion-title>{{ esRegistro ? 'Registro' : 'Login' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="floating">Usuario (máx 8 caracteres)</ion-label>
    <ion-input [(ngModel)]="user_name" maxlength="8"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Contraseña (solo números)</ion-label>
    <ion-input type="number" [(ngModel)]="password"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="onSubmit()">
    {{ esRegistro ? 'Registrar y entrar' : 'Iniciar sesión' }}
  </ion-button>

  <ion-button fill="clear" expand="block" (click)="cambiarModo()">
    {{ esRegistro ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate' }}
  </ion-button>

</ion-content>
