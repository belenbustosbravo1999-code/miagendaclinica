<ion-content class="login-content">
  <div class="login-wrapper">

    <!-- Cabecera: ícono + nombre de app -->
    <div class="login-header">
      <div class="login-icon-wrap">
        <ion-icon name="medkit-outline" class="login-icon"></ion-icon>
      </div>
      <h1 class="app-name">MiAgendaClínica</h1>
      <p class="login-subtitle">{{ esRegistro ? 'Crear cuenta' : 'Bienvenido de nuevo' }}</p>
    </div>

    <!-- Card del formulario -->
    <div class="login-card">

      <div class="field-group">
        <span class="field-label">Usuario</span>
        <ion-item lines="none" class="form-item">
          <ion-input
            [(ngModel)]="user_name"
            maxlength="8"
            autocomplete="username"
            placeholder="Máx. 8 caracteres">
          </ion-input>
        </ion-item>
      </div>

      <div class="field-group">
        <span class="field-label">Contraseña</span>
        <ion-item lines="none" class="form-item">
          <ion-input
            type="password"
            [(ngModel)]="password"
            autocomplete="current-password"
            placeholder="Ingresa tu contraseña">
          </ion-input>
        </ion-item>
      </div>

      <ion-button expand="block" (click)="onSubmit()" class="submit-btn">
        {{ esRegistro ? 'Registrar y entrar' : 'Iniciar sesión' }}
      </ion-button>

      <ion-button fill="outline" expand="block" (click)="cambiarModo()" class="switch-btn">
        {{ esRegistro ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate' }}
      </ion-button>

    </div>
  </div>
</ion-content>
