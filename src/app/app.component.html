<ion-app>

  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>

  <ion-tab-bar slot="bottom" class="app-tab-bar" *ngIf="mostrarTabs">
    <ion-tab-button (click)="navTo('/home')" [selected]="isActive('/home')">
      <ion-icon [name]="isActive('/home') ? 'home' : 'home-outline'"></ion-icon>
      <ion-label>Inicio</ion-label>
    </ion-tab-button>

    <ion-tab-button (click)="navTo('/citas')" [selected]="isActive('/citas')">
      <ion-icon [name]="isActive('/citas') ? 'calendar' : 'calendar-outline'"></ion-icon>
      <ion-label>Citas</ion-label>
    </ion-tab-button>

    <ion-tab-button (click)="navTo('/pacientes')" [selected]="isActive('/pacientes')">
      <ion-icon [name]="isActive('/pacientes') ? 'people' : 'people-outline'"></ion-icon>
      <ion-label>Pacientes</ion-label>
    </ion-tab-button>
  </ion-tab-bar>

</ion-app>
